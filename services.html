/* Service Cards */
.service-card {
    width: 80%;
    margin: 20px auto;
    padding: 20px;
    background-color: white;
    border: 2px solid #003366;
    border-radius: 8px;
    text-align: left;
}

.service-card h3 {
    color: #003366;
    margin-bottom: 10px;
}

.service-card p {
    font-size: 16px;
    line-height: 1.5;
}
